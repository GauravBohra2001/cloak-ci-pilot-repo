name: Cloak Repo Scan

on:
  push:
    branches:
      - main
  pull_request:
  schedule:
    - cron: "0 4 * * *"

permissions:
  contents: read

jobs:
  cloak-scan:
    name: Cloak Security Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Build repository archive
        run: git archive HEAD --format=zip -o repo.zip

      - name: Compute changed paths for PRs
        id: changed
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            git diff --name-only \
              "${{ github.event.pull_request.base.sha }}" \
              "${{ github.sha }}" \
              | jq -R . | jq -s -c . > changed_paths.json
            echo "Changed files: $(cat changed_paths.json)"
          else
            echo "[]" > changed_paths.json
          fi

      - name: Submit Cloak scan
        id: submit
        env:
          CLOAK_BASE_URL: ${{ secrets.CLOAK_BASE_URL }}
          CLOAK_API_TOKEN: ${{ secrets.CLOAK_API_TOKEN }}
        shell: bash
        run: |
          EVENT_NAME="${{ github.event_name }}"
          TRIGGER_SOURCE="push"
          SCAN_MODE="full_scan"
          PR_NUMBER=""
          BASE_SHA=""

          if [ "$EVENT_NAME" = "pull_request" ]; then
            TRIGGER_SOURCE="pull_request"
            SCAN_MODE="changed_files"
            PR_NUMBER="${{ github.event.pull_request.number }}"
            BASE_SHA="${{ github.event.pull_request.base.sha }}"
          elif [ "$EVENT_NAME" = "schedule" ]; then
            TRIGGER_SOURCE="schedule"
            SCAN_MODE="scheduled_scan"
          fi

          CHANGED_PATHS_JSON="$(cat changed_paths.json)"

          RESPONSE=$(curl -sS -X POST "${CLOAK_BASE_URL}/integrations/repo-scans" \
            -H "Authorization: Bearer ${CLOAK_API_TOKEN}" \
            -F "file=@repo.zip" \
            -F "repo_full_name=${{ github.repository }}" \
            -F "repo_url=${{ github.server_url }}/${{ github.repository }}" \
            -F "repo_external_id=${{ github.repository_id }}" \
            -F "vcs_provider=github" \
            -F "branch_name=${{ github.ref_name }}" \
            -F "commit_sha=${{ github.sha }}" \
            -F "ref_name=${{ github.ref }}" \
            -F "trigger_source=${TRIGGER_SOURCE}" \
            -F "scan_mode=${SCAN_MODE}" \
            -F "pull_request_number=${PR_NUMBER}" \
            -F "base_commit_sha=${BASE_SHA}" \
            -F "changed_paths=${CHANGED_PATHS_JSON}")

          echo "Response: ${RESPONSE}"

          RUN_ID=$(echo "${RESPONSE}" | jq -r '.data.run_id // empty')
          if [ -z "${RUN_ID}" ]; then
            ERROR_CODE=$(echo "${RESPONSE}" | jq -r '.error.code // empty')
            ERROR_MSG=$(echo "${RESPONSE}"  | jq -r '.error.message // empty')
            if [ "${ERROR_CODE}" = "rate_limited" ]; then
              echo "::error::Cloak rate limit reached. ${ERROR_MSG}"
            else
              echo "::error::Scan submission failed. ${ERROR_MSG}"
            fi
            echo "Full response: ${RESPONSE}"
            exit 1
          fi

          echo "run_id=${RUN_ID}" >> $GITHUB_OUTPUT
          echo "Scan submitted: run_id=${RUN_ID}"

      # Waits for TWO phases to complete:
      #   Phase 1 - Scanner (semgrep + LLM enrichment): ~3-5 min
      #             status becomes "completed" when done
      #   Phase 2 - Compliance Intelligence Agent: ~90-180 sec after scan
      #             compliance_assessed_at is set when done
      #
      # Both must complete before we read the CI decision, so the dashboard
      # is fully populated when the developer clicks through.
      - name: Wait for scan and compliance analysis to complete
        id: wait
        env:
          CLOAK_BASE_URL: ${{ secrets.CLOAK_BASE_URL }}
          CLOAK_API_TOKEN: ${{ secrets.CLOAK_API_TOKEN }}
        shell: bash
        run: |
          RUN_ID="${{ steps.submit.outputs.run_id }}"
          MAX_WAIT=900
          ELAPSED=0
          INTERVAL=15

          echo "Waiting for Cloak scanner and compliance agent (timeout: ${MAX_WAIT}s)..."

          while [ $ELAPSED -lt $MAX_WAIT ]; do
            RESP=$(curl -sS \
              -H "Authorization: Bearer ${CLOAK_API_TOKEN}" \
              "${CLOAK_BASE_URL}/scans/${RUN_ID}")

            STATUS=$(echo "${RESP}" | jq -r '.data.status // "unknown"')
            AGENT_DONE=$(echo "${RESP}" | jq -r '.data.compliance_assessed_at // empty')

            AGENT_LABEL="waiting"
            [ -n "${AGENT_DONE}" ] && AGENT_LABEL="done"
            echo "[${ELAPSED}s] scan=${STATUS} agent=${AGENT_LABEL}"

            case "$STATUS" in
              failed)
                echo "::error::Cloak scan failed."
                echo "scan_status=${STATUS}" >> $GITHUB_OUTPUT
                exit 1
                ;;
              completed|completed_with_errors)
                if [ -n "${AGENT_DONE}" ]; then
                  echo "Scanner and compliance agent both complete."
                  echo "scan_status=${STATUS}" >> $GITHUB_OUTPUT
                  break
                else
                  echo "Scanner done. Waiting for compliance agent..."
                fi
                ;;
            esac

            sleep $INTERVAL
            ELAPSED=$((ELAPSED + INTERVAL))
          done

          if [ $ELAPSED -ge $MAX_WAIT ]; then
            echo "::error::Timed out after ${MAX_WAIT}s."
            exit 1
          fi

      - name: Read compliance decision
        id: decision
        env:
          CLOAK_BASE_URL: ${{ secrets.CLOAK_BASE_URL }}
          CLOAK_API_TOKEN: ${{ secrets.CLOAK_API_TOKEN }}
          CLOAK_BLOCK_ON_FAIL: ${{ secrets.CLOAK_BLOCK_ON_FAIL }}
        shell: bash
        run: |
          RUN_ID="${{ steps.submit.outputs.run_id }}"

          CI_RESPONSE=$(curl -sS \
            -H "Authorization: Bearer ${CLOAK_API_TOKEN}" \
            "${CLOAK_BASE_URL}/scans/${RUN_ID}/ci.json")

          DECISION=$(echo "${CI_RESPONSE}" | jq -r '.data.run_outcome.decision // "unknown"')
          OUTCOME=$(echo "${CI_RESPONSE}"  | jq -r '.data.run_outcome.outcome  // "unknown"')
          BLOCKING_REASONS=$(echo "${CI_RESPONSE}" | jq -r '.data.run_outcome.blocking_reasons // [] | join(", ")')
          WARNING_REASONS=$(echo "${CI_RESPONSE}"  | jq -r '.data.run_outcome.warning_reasons  // [] | join(", ")')

          NOT_READY=$(echo "${CI_RESPONSE}" | jq -r '.data.audit_readiness_summary.verdict_counts.not_ready // 0')
          AT_RISK=$(echo "${CI_RESPONSE}"   | jq -r '.data.audit_readiness_summary.verdict_counts.at_risk // 0')
          READY=$(echo "${CI_RESPONSE}"     | jq -r '.data.audit_readiness_summary.verdict_counts.audit_ready // 0')
          AGENT_AVAILABLE=$(echo "${CI_RESPONSE}" | jq -r '.data.audit_readiness_summary.available // false')

          echo ""
          echo "════════════════════════════════════════════"
          echo "  Cloak Compliance Scan Result"
          echo ""
          echo "  Scanner decision  : ${DECISION}"
          echo "  Outcome           : ${OUTCOME}"
          [ -n "${BLOCKING_REASONS}" ] && echo "  Blocking          : ${BLOCKING_REASONS}"
          [ -n "${WARNING_REASONS}"  ] && echo "  Warnings          : ${WARNING_REASONS}"
          echo ""
          if [ "${AGENT_AVAILABLE}" = "true" ]; then
            echo "  Compliance posture: ${NOT_READY} Must Fix · ${AT_RISK} Needs Attention · ${READY} Audit Ready"
          fi
          echo ""
          echo "  Dashboard: https://app.getcloakai.com/scans/${RUN_ID}"
          echo "════════════════════════════════════════════"
          echo ""

          echo "decision=${DECISION}" >> $GITHUB_OUTPUT
          echo "outcome=${OUTCOME}"   >> $GITHUB_OUTPUT

          if [ "$DECISION" = "block" ]; then
            echo "::error::Cloak blocked this scan. ${BLOCKING_REASONS}. Dashboard: https://app.getcloakai.com/scans/${RUN_ID}"
            if [ "${CLOAK_BLOCK_ON_FAIL}" = "true" ]; then
              exit 1
            else
              echo "Set CLOAK_BLOCK_ON_FAIL=true to enforce blocking."
            fi
          elif [ "$DECISION" = "warn" ]; then
            echo "::warning::Cloak warnings: ${WARNING_REASONS}"
          else
            echo "Cloak scan passed."
          fi
